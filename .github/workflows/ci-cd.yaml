name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  AKS_CLUSTER: ${{ vars.AKS_CLUSTER }}
  AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
  HELM_RELEASE: jarvis-automation

jobs:
  # ─── Build & Test Backend ──────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Verify app loads
        run: python -c "from app.main import app; print(f'{len(app.routes)} routes OK')"

  # ─── Build & Test Frontend ─────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  # ─── Build Container Images via ACR Build (no Docker required) ─────
  build-images:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push backend image (ACR Build)
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image jarvis-backend:${{ github.sha }} \
            --image jarvis-backend:latest \
            --file deploy/containerfiles/backend.containerfile \
            ./backend

      - name: Build & push frontend image (ACR Build)
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image jarvis-frontend:${{ github.sha }} \
            --image jarvis-frontend:latest \
            --file deploy/containerfiles/frontend.containerfile \
            --build-arg VITE_API_URL=/api \
            .

  # ─── Deploy to AKS via Helm ─────────────────────────────────────────
  deploy:
    needs: [build-images]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group $AKS_RESOURCE_GROUP --name $AKS_CLUSTER

      - name: Helm upgrade
        run: |
          helm upgrade --install $HELM_RELEASE ./helm/jarvis-automation \
            --namespace jarvis \
            --create-namespace \
            --set image.registry=$ACR_NAME.azurecr.io \
            --set image.backend.tag=${{ github.sha }} \
            --set image.frontend.tag=${{ github.sha }} \
            --set host=${{ vars.APP_HOST }} \
            --set keyvault.url=${{ vars.KEYVAULT_URL }} \
            --set keycloak.url=${{ vars.KEYCLOAK_URL }} \
            --set keycloak.realm=${{ vars.KEYCLOAK_REALM }} \
            --set keycloak.clientId=${{ vars.KEYCLOAK_CLIENT_ID }} \
            --set workloadIdentity.clientId=${{ vars.WORKLOAD_IDENTITY_CLIENT_ID }} \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/jarvis-backend -n jarvis --timeout=120s
          kubectl rollout status deployment/jarvis-frontend -n jarvis --timeout=120s
